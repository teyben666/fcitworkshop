<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Safe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,700;14..32,900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/shared.css" />
    <link rel="stylesheet" href="css/lobby-hud.css" />
    <script src="js/i18n.js"></script>
</head>
<body class="lobby-page" data-i18n-page-title="pageTitleHome">
    <main class="portal">
        <div class="portal-logo"><img src="logo-dark.png" alt="Currency Safe" /></div>
        <h1 data-i18n="gameTitle">Currency Safe: 金库行动</h1>
        <p class="subtitle" data-i18n="homeSubtitle">马来西亚金库行动 · 真人互攻 · 创建或加入房间开始</p>

        <div class="hud-panel">
            <div class="btn-row">
                <button type="button" class="primary" id="createRoomBtn" data-i18n="createRoom">创建房间</button>
                <button type="button" class="cyan" id="showJoinBtn" data-i18n="joinRoom">加入房间</button>
            </div>
            <div class="btn-row" style="margin-top:4px">
                <button type="button" class="secondary" id="singlePlayerBtn" data-i18n="singlePlayerBtn" style="flex:1">单人练习</button>
            </div>

            <div id="joinPanel" class="hidden">
                <label for="roomCodeInput" data-i18n="roomCode">房间码</label>
                <input id="roomCodeInput" maxlength="6" data-i18n-placeholder="roomCodePlaceholder" placeholder="例如 AB12" autocomplete="off" />
                <div class="btn-row">
                    <button type="button" class="primary" id="joinRoomBtn" data-i18n="enterRoom">进入房间</button>
                    <button type="button" class="secondary" id="cancelJoinBtn" data-i18n="cancel">取消</button>
                </div>
            </div>

            <div id="homeNotice" class="notice hidden"></div>
        </div>

        <p class="subtitle" style="font-size: 0.82rem; margin-top: 24px;" id="syncStatus" data-i18n="syncLocal">
            同步：localStorage 演示 · 配置 Firebase 后支持多设备（见 DEPLOY.md）
        </p>
    </main>

    <script src="js/malaysia-states.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/room-shared.js"></script>
    <script src="js/room-local.js"></script>
    <script src="js/room-firebase.js"></script>
    <script src="js/room.js"></script>
    <script>
        const $ = (id) => document.getElementById(id);
        const t = (k) => CurrencySafeI18n.t(k);
        const notice = $("homeNotice");

        CurrencySafeI18n.mountLangBar({
            onChange: () => refreshSyncStatus()
        });

        function showNotice(msg, isError) {
            notice.textContent = msg;
            notice.className = "notice " + (isError ? "error" : "success");
            notice.classList.remove("hidden");
        }

        function refreshSyncStatus() {
            $("syncStatus").textContent = CurrencySafeRoom.isOnline()
                ? t("syncFirebase")
                : t("syncLocal");
        }

        CurrencySafeRoom.ready.then(refreshSyncStatus);

        $("createRoomBtn").onclick = () => {
            sessionStorage.removeItem("csGameMode");
            Promise.resolve(CurrencySafeRoom.createRoom()).then(room => {
                location.href = "lobby.html?room=" + encodeURIComponent(room.id);
            }).catch(() => showNotice(t("createFailed"), true));
        };

        $("showJoinBtn").onclick = () => {
            $("joinPanel").classList.remove("hidden");
            $("roomCodeInput").focus();
        };

        $("cancelJoinBtn").onclick = () => {
            $("joinPanel").classList.add("hidden");
            notice.classList.add("hidden");
        };

        $("joinRoomBtn").onclick = () => {
            const code = $("roomCodeInput").value.trim().toUpperCase();
            if (!code) {
                showNotice(t("enterCode"), true);
                return;
            }
            sessionStorage.removeItem("csGameMode");
            Promise.resolve(CurrencySafeRoom.joinRoom(code)).then(res => {
                if (!res.ok) {
                    showNotice(res.error, true);
                    return;
                }
                location.href = "lobby.html?room=" + encodeURIComponent(res.room.id);
            });
        };

        $("roomCodeInput").addEventListener("keydown", (e) => {
            if (e.key === "Enter") $("joinRoomBtn").click();
        });

        $("singlePlayerBtn").onclick = () => {
            sessionStorage.setItem("csGameMode", "single");
            location.href = "singleplayer.html";
        };
    </script>
</body>
</html>
