<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Safe · Solo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,700;14..32,900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/shared.css" />
    <script src="js/i18n.js"></script>
</head>
<body data-i18n-page-title="pageTitleHome">
    <main class="portal">
        <div class="portal-logo"><img src="logo-dark.png" alt="Currency Safe" /></div>
        <h1 data-i18n="singlePlayerTitle">单人练习 · 对战电脑</h1>
        <p class="subtitle" data-i18n="singlePlayerDesc">无需房间码。5 支 AI 金库会出现在地图上，规则与练习模式相同：部署不限、密码 20 分钟轮换。</p>

        <div class="card">
            <div class="btn-row">
                <button type="button" class="primary" id="startSoloBtn" data-i18n="singlePlayerStart">开始单人任务</button>
                <a href="index.html" class="btn secondary" data-i18n="singlePlayerBack">返回首页</a>
            </div>
        </div>
    </main>

    <script>
        CurrencySafeI18n.mountLangBar();
        document.getElementById("startSoloBtn").onclick = () => {
            sessionStorage.setItem("csGameMode", "single");
            location.href = "game.html?mode=single";
        };
    </script>
</body>
</html>
