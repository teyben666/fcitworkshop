<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Safe · 训练营</title>
    <link rel="icon" href="fcitlogo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,700;14..32,900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/shared.css" />
    <link rel="stylesheet" href="css/lobby-hud.css?v=20260629" />
    <link rel="stylesheet" href="css/home-portal.css?v=20260629" />
    <link rel="stylesheet" href="css/tutorial-portal.css?v=20260629" />
    <script src="js/i18n.js?v=20260629"></script>
    <script src="js/portal-sound.js?v=20260629"></script>
    <script src="js/i18n-missions-catalog.js?v=20260626"></script>
    <script src="js/mission-i18n.js?v=20260626"></script>
    <script src="js/mission-games.js?v=20260626"></script>
    <script src="js/tutorial-catalog.js?v=20260626"></script>
</head>
<body class="lobby-page home-page tutorial-page" data-i18n-page-title="tutorialPageTitle">
    <div class="home-dot-grid" aria-hidden="true"></div>
    <div class="lobby-hud-overlay" aria-hidden="true"></div>

    <header class="home-topbar glass-panel">
        <div class="home-topbar-brand">
            <a href="index.html" class="home-topbar-logo" aria-label="FCIT">
                <img src="fcitlogo.png" alt="FCIT" width="64" height="64" />
            </a>
            <div class="home-topbar-titles">
                <p class="home-topbar-kicker">Federal Security Network</p>
                <h1>
                    <span data-i18n="gameTitlePrefix">Currency Safe:</span>
                    <span class="gradient-text" data-i18n="tutorialTitle">训练营</span>
                </h1>
                <p class="subtitle" data-i18n="tutorialSubtitle">点选关卡直接开玩 · 适合课堂演示与自由加练</p>
            </div>
        </div>
        <div class="home-topbar-actions">
            <div class="home-lang-slot" id="tutorialLangSlot" aria-label="Language"></div>
            <button type="button" class="home-menu-btn" id="tutorialMenuBtn" aria-expanded="false" aria-controls="tutorialMenuPanel" data-i18n-aria-label="menuOpen">
                <span class="home-menu-icon" aria-hidden="true"></span>
            </button>
        </div>
        <div class="home-menu-panel hidden" id="tutorialMenuPanel" role="menu">
            <button type="button" class="home-menu-item home-sound-btn" id="tutorialSoundToggle" aria-pressed="false" role="menuitem" data-i18n="muteOff">音效：开</button>
            <a href="index.html" class="home-menu-item home-toolbar-link" role="menuitem" data-i18n="tutorialBackHome">返回首页</a>
        </div>
    </header>

    <main class="portal home-shell">
        <div class="home-badge" style="margin-bottom:1.25rem">
            <span>🎯</span>
            <span data-i18n="tutorialBadge">Training Sandbox</span>
        </div>

        <div id="tutorialSections"></div>
    </main>

    <script>
        const $ = (id) => document.getElementById(id);
        const t = (k) => CurrencySafeI18n.t(k);
        const mT = (k) => window.MissionI18n?.mT?.(k) ?? t(k);

        function labelFor(item) {
            if (item.titleKey.startsWith("mission.")) return mT(item.titleKey);
            return t(item.titleKey);
        }

        function descFor(item) {
            if (item.descKey?.startsWith("mission.")) return mT(item.descKey);
            return t(item.descKey || "");
        }

        function renderSections() {
            const host = $("tutorialSections");
            if (!host || !window.TutorialCatalog) return;
            const sections = TutorialCatalog.getSections();
            if (!sections.length) {
                host.innerHTML = `<p class="tutorial-empty">${t("tutorialEmpty")}</p>`;
                return;
            }
            host.innerHTML = sections.map((sec) => `
                <section class="tutorial-section" aria-labelledby="tut-sec-${sec.id}">
                    <h2 id="tut-sec-${sec.id}">${t(sec.titleKey)}</h2>
                    <p class="section-hint">${t("tutorialSectionHint")}</p>
                    <div class="tutorial-grid" role="list">
                        ${sec.items.map((item) => `
                            <button type="button" class="tutorial-card" role="listitem"
                                data-kind="${item.id}"
                                aria-label="${labelFor(item)}">
                                <span class="tc-icon">${item.icon}</span>
                                <span class="tc-title">${labelFor(item)}</span>
                                <span class="tc-desc">${descFor(item)}</span>
                                <span class="tc-cta">${t("tutorialPlayCta")}</span>
                            </button>
                        `).join("")}
                    </div>
                </section>
            `).join("");

            host.querySelectorAll(".tutorial-card").forEach((btn) => {
                btn.onclick = () => {
                    const kind = btn.dataset.kind;
                    if (!kind) return;
                    sessionStorage.removeItem("csGameMode");
                    sessionStorage.setItem("csTutorialKind", kind);
                    location.href = TutorialCatalog.launchUrl(kind);
                };
            });
        }

        CurrencySafeI18n.mountLangBar({
            onChange: () => {
                CurrencySafeI18n.applyToDocument();
                renderSections();
                updateTutorialSoundBtn();
            }
        });
        const langSlot = $("tutorialLangSlot");
        const langBar = document.getElementById("csLangBar");
        if (langSlot && langBar) {
            langBar.classList.add("lang-bar--inline");
            langSlot.appendChild(langBar);
        }

        function updateTutorialSoundBtn() {
            const btn = $("tutorialSoundToggle");
            if (!btn) return;
            const muted = CurrencySafePortalSound.isMuted();
            btn.setAttribute("aria-pressed", muted ? "true" : "false");
            btn.textContent = t(muted ? "muteOn" : "muteOff");
            btn.classList.toggle("is-muted", muted);
        }
        $("tutorialSoundToggle")?.addEventListener("click", () => {
            CurrencySafePortalSound.toggle();
            updateTutorialSoundBtn();
        });
        updateTutorialSoundBtn();

        function toggleTutorialMenu(force) {
            const panel = $("tutorialMenuPanel");
            const btn = $("tutorialMenuBtn");
            if (!panel || !btn) return;
            const open = typeof force === "boolean" ? force : panel.classList.contains("hidden");
            panel.classList.toggle("hidden", !open);
            btn.setAttribute("aria-expanded", open ? "true" : "false");
        }
        $("tutorialMenuBtn")?.addEventListener("click", (e) => {
            e.stopPropagation();
            toggleTutorialMenu($("tutorialMenuPanel")?.classList.contains("hidden"));
        });
        document.addEventListener("click", (e) => {
            if (!e.target.closest(".home-topbar")) toggleTutorialMenu(false);
        });
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") toggleTutorialMenu(false);
        });

        CurrencySafeI18n.applyToDocument();
        renderSections();
    </script>
</body>
</html>
