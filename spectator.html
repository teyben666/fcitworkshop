<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Safe · Spectator</title>
    <link rel="icon" href="fcitlogo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,700;14..32,900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/shared.css" />
    <link rel="stylesheet" href="css/vendor/krackedmaps.css" />
    <link rel="stylesheet" href="css/kracked-map-overrides.css?v=20260628" />
    <link rel="stylesheet" href="css/spectator-dashboard.css" />
</head>
<body class="spectator-page">
    <main class="spectator-dashboard">
        <header class="spectator-top">
            <div>
                <h1 data-i18n="specTitle">观战模式</h1>
                <p class="subtitle">
                    <span data-i18n="specRoom">房间</span> <span class="room-code" id="roomCodeDisplay">----</span>
                    · <span class="mode-badge practice" id="modeBadge" data-i18n="specModePractice">练习</span>
                    · <span data-i18n="specRemaining">剩余</span> <span id="matchTimeLabel">—</span>
                </p>
            </div>
            <div class="spectator-top-actions">
                <a href="index.html" class="btn secondary" data-i18n="specHome">首页</a>
            </div>
        </header>

        <div class="spectator-main">
            <section class="spectator-left">
                <div class="card spectator-map-card">
                    <h2><span data-i18n="specMapTitle">马来西亚威胁地图</span> <span class="tag" data-i18n="specMapTag">只读 · 州色攻击线</span></h2>
                    <div class="spectator-map-outer" id="spectatorMapOuter">
                        <div class="map-preview-wrap" id="spectatorMap"></div>
                        <div class="bank-bonus-pin spectator-pin hidden" id="spectatorBankBonus" data-phase="hidden">
                            <span class="bank-bonus-ring"></span>
                            <span class="bank-bonus-dot">🏦</span>
                            <span class="bank-bonus-label" data-i18n="bankBonusLabel">央行 Bonus</span>
                            <span class="bank-bonus-phase"></span>
                        </div>
                    </div>
                </div>
                <div class="card spectator-activity-card">
                    <h2><span data-i18n="specActivityTitle">Activity 动态</span> <span class="tag" data-i18n="specActivityTag">最新在上</span></h2>
                    <div class="activity-feed" id="activityFeed"></div>
                </div>
            </section>

            <aside class="card spectator-right">
                <h2><span data-i18n="specLeaderboard">排行榜</span> <span class="tag" id="leaderboardLockTag"></span></h2>
                <div class="spec-leaderboard-wrap">
                    <table class="spec-leaderboard">
                        <thead>
                            <tr>
                                <th data-i18n="specColRank">排名</th>
                                <th data-i18n="specColName">名字</th>
                                <th data-i18n="specColTeam">队伍</th>
                                <th data-i18n="specColState">州</th>
                                <th data-i18n="specColTarget">目标</th>
                                <th data-i18n="specColLevels">三关</th>
                                <th data-i18n="specColBalance">余额</th>
                                <th data-i18n="specColSteal">盗</th>
                                <th data-i18n="specColRobbed">被盗</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody"></tbody>
                    </table>
                </div>
            </aside>
        </div>
    </main>

    <script src="js/malaysia-states.js"></script>
    <script src="js/map-attack-lines.js"></script>
    <script src="js/map-layout.js"></script>
    <script src="js/map-viewport.js?v=20260629"></script>
    <script src="js/bank-bonus-pin.js?v=20260630c"></script>
    <script src="js/vendor/krackedmaps.umd.js"></script>
    <script src="js/kracked-malaysia-map.js?v=20260628b"></script>
    <script src="js/server-config.js?v=20260626"></script>
    <script src="js/room-shared.js"></script>
    <script src="js/room-local.js"></script>
    <script src="js/room-ws.js?v=20260626"></script>
    <script src="js/room.js?v=20260626"></script>
    <script src="js/i18n.js?v=20260630c"></script>
    <script src="js/bank-bonus-scheduler.js"></script>
    <script>
        const $ = (id) => document.getElementById(id);
        const t = (key) => CurrencySafeI18n.t(key);
        const tr = (msg) => CurrencySafeI18n.trError(msg);
        const stateLabel = (id) => window.getStateLabel?.(id) ?? id;
        const roomId = (new URLSearchParams(location.search).get("room")
            || sessionStorage.getItem(CurrencySafeRoom.SK.roomId) || "").toUpperCase();

        if (!roomId) location.href = "index.html";

        const ACTIVITY_LABELS = {
            player_join: "activityPlayerJoin",
            player_leave: "activityPlayerLeave",
            spectator_join: "activitySpectatorJoin",
            game_start: "activityGameStart",
            shuffle_teams: "activityShuffle",
            shuffle_states: "activityShuffleStates",
            mode_change: "activityModeChange",
            target_selected: "activityMissionDeploy",
            mission_deployed: "activityMissionDeploy",
            level_complete: "activityLevelClear",
            level_fail: "activityLevelClear",
            password_rotated: "activitySettings",
            password_expired: "activitySettings",
            vault_breach: "activityVaultBreach",
            transfer: "activityTransfer",
            bank_transfer: "activityBankBonus",
            bank_bonus: "activityBankBonus",
            bank_bonus_complete: "activityBankBonus",
            game_end: "activityGameEnd",
            room_created: "activityGameStart",
            settings: "activitySettings"
        };

        function activityTag(type) {
            const key = ACTIVITY_LABELS[type];
            return key ? t(key) : type;
        }

        function escapeHtml(t) {
            const d = document.createElement("div");
            d.textContent = t;
            return d.innerHTML;
        }

        function formatRemaining(ms) {
            const s = Math.max(0, Math.floor(ms / 1000));
            return `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;
        }

        function progressDots(levels) {
            if (!levels || !levels.length) return "—/3";
            const done = levels.filter(Boolean).length;
            return `${done}/3`;
        }

        const MAP_LAYOUT = window.CurrencySafeMapLayout;

        function spectatorMapLayout(wrapW, wrapH) {
            return MAP_LAYOUT.computeLayout(wrapW, wrapH);
        }

        function spectatorPinPercent(mapX, mapY, layout) {
            return MAP_LAYOUT.imagePercentToWrapPercent(mapX, mapY, layout);
        }

        function updateSpectatorBankBonus(room) {
            const pin = $("spectatorBankBonus");
            if (!pin || !window.BankBonusScheduler) return;
            const status = BankBonusScheduler.computePhase(room, Date.now());
            pin.classList.remove("hidden", "phase-arrive", "phase-breathe", "phase-depart");
            pin.dataset.phase = status.phase;
            if (status.phase === "hidden") {
                pin.classList.add("hidden");
                return;
            }
            pin.classList.add("phase-" + status.phase);
            const mapEl = $("spectatorMap");
            const inner = mapEl?.querySelector(".map-preview-inner");
            if (!inner) return;
            const rect = inner.getBoundingClientRect();
            const layout = spectatorMapLayout(rect.width, rect.height);
            const pinCoords = BankBonusScheduler.BANK_BONUS_PIN;
            const pos = spectatorPinPercent(pinCoords.mapX, pinCoords.mapY, layout);
            pin.style.left = pos.x + "%";
            pin.style.top = pos.y + "%";
            const phaseEl = pin.querySelector(".bank-bonus-phase");
            if (phaseEl) {
                const left = status.phaseEndsAt
                    ? BankBonusScheduler.formatCountdown(status.phaseEndsAt - Date.now())
                    : "";
                phaseEl.textContent = BankBonusScheduler.phaseLabel(status) + (left ? " · " + left : "");
            }
        }

        function render(room) {
            if (!room) room = CurrencySafeRoom.getRoom(roomId);
            if (!room) {
                location.href = "index.html";
                return;
            }
            if (room.status === "lobby") {
                location.href = "lobby.html?room=" + roomId;
                return;
            }
            if (room.status === "ended") {
                location.href = "ended.html?room=" + roomId;
                return;
            }

            const S = CurrencySafeRoomShared;
            $("roomCodeDisplay").textContent = room.id;
            const isComp = room.mode === "competitive";
            const modeBadge = $("modeBadge");
            modeBadge.textContent = isComp ? t("specModeCompetitive") : t("specModePractice");
            modeBadge.className = "mode-badge " + (isComp ? "competitive" : "practice");
            const rem = S.getMatchRemainingMs(room);
            $("matchTimeLabel").textContent = rem != null ? formatRemaining(rem) : "—";

            const mapPlayers = room.players.map(p => ({
                ...p,
                balance: S.playerVaultBalance(room, p.id)
            }));
            if (window.MalaysiaMapPreview) {
                const mapEl = $("spectatorMap");
                const mapOpts = {
                    mode: "spectator",
                    showAttackLines: true,
                    hideGhostPins: true,
                    minimalPins: true
                };
                if (mapEl._mapSetPlayers) mapEl._mapSetPlayers(mapPlayers, mapOpts);
                else MalaysiaMapPreview.render(mapEl, mapPlayers, mapOpts);
            }
            updateSpectatorBankBonus(room);

            $("leaderboardLockTag").textContent = room.leaderboardLocked ? t("specLeaderboardLocked") : "";

            const txs = room.transactions || [];

            const sorted = [...room.players].sort((a, b) => {
                const bal = S.playerVaultBalance(room, b.id) - S.playerVaultBalance(room, a.id);
                if (bal !== 0) return bal;
                const sa = S.transferStatsForPlayer(a, txs);
                const sb = S.transferStatsForPlayer(b, txs);
                return sb.stealTotal - sa.stealTotal;
            });

            $("leaderboardBody").innerHTML = sorted.length
                ? sorted.map((p, i) => {
                    const prog = p.missionProgress;
                    const dots = progressDots(prog?.levels);
                    const target = prog?.targetName ? escapeHtml(prog.targetName) : "—";
                    const nameColor = window.getStateColor?.(p.stateId) || "#38bdf8";
                    const st = CurrencySafeRoomShared.transferStatsForPlayer(p, txs);
                    const teamState = (() => {
                        const team = (room.teams || []).find(tm => tm.id === p.teamId);
                        return team?.stateId
                            ? stateLabel(team.stateId)
                            : (window.formatStoredStateLabel?.(team) || team?.name || "—");
                    })();
                    const playerState = p.stateId
                        ? stateLabel(p.stateId)
                        : (window.formatStoredStateLabel?.(p) || "—");
                    return `<tr>
                        <td class="col-rank">#${i + 1}</td>
                        <td class="col-name"><strong style="color:${nameColor}">${escapeHtml(p.name)}</strong></td>
                        <td>${escapeHtml(teamState)}</td>
                        <td style="color:${nameColor}">${escapeHtml(playerState)}</td>
                        <td>${target}</td>
                        <td>${dots}</td>
                        <td class="col-bal">RM ${S.playerVaultBalance(room, p.id).toLocaleString()}</td>
                        <td class="col-stat">${st.stealCount}${t("statTimes")}<br/><span class="stat-amt">RM ${st.stealTotal.toLocaleString()}</span></td>
                        <td class="col-stat">${st.robbedCount}${t("statTimes")}<br/><span class="stat-amt">RM ${st.robbedTotal.toLocaleString()}</span></td>
                    </tr>`;
                }).join("")
                : `<tr><td colspan="9" class="empty-row">${escapeHtml(t("specEmptyPlayers"))}</td></tr>`;

            const feed = room.activity || [];
            $("activityFeed").innerHTML = feed.length
                ? feed.map(a => {
                    const label = activityTag(a.type);
                    return `<div class="item" data-type="${escapeHtml(a.type || "")}">
                        <strong>${new Date(a.at).toLocaleTimeString()}</strong>
                        <span class="tag">[${escapeHtml(label)}]</span>
                        ${escapeHtml(a.message)}
                    </div>`;
                }).join("")
                : `<div class="item">${escapeHtml(t("specEmptyActivity"))}</div>`;
        }

        const HOST_END_HOLD_MS = 3000;
        let hostEndKeyTimer = null;
        let hostEndKeyStart = 0;
        let hostEndToastAt = 0;

        function isHostEndKey(e) {
            return e.key === "`" || e.code === "Backquote";
        }

        function bindHostLongPressEnd() {
            document.addEventListener("keydown", (e) => {
                if (!isHostEndKey(e) || e.repeat) return;
                const room = CurrencySafeRoom.getRoom(roomId);
                if (!room || room.status !== "playing" || !CurrencySafeRoom.isHost(room)) return;
                hostEndKeyStart = Date.now();
                if (hostEndKeyTimer) clearInterval(hostEndKeyTimer);
                hostEndKeyTimer = setInterval(() => {
                    const elapsed = Date.now() - hostEndKeyStart;
                    if (elapsed >= HOST_END_HOLD_MS) {
                        clearInterval(hostEndKeyTimer);
                        hostEndKeyTimer = null;
                        Promise.resolve(CurrencySafeRoom.endGame(roomId)).then(res => {
                            if (res?.ok) location.href = "ended.html?room=" + roomId;
                        });
                    } else if (elapsed >= 800 && Date.now() - hostEndToastAt > 600) {
                        hostEndToastAt = Date.now();
                        const left = Math.ceil((HOST_END_HOLD_MS - elapsed) / 1000);
                        console.log(CurrencySafeI18n.tReplace("hostEndHold", { n: left }));
                    }
                }, 200);
            });
            document.addEventListener("keyup", (e) => {
                if (!isHostEndKey(e)) return;
                if (hostEndKeyTimer) {
                    clearInterval(hostEndKeyTimer);
                    hostEndKeyTimer = null;
                }
            });
        }

        CurrencySafeRoom.ready.then(() => Promise.resolve(CurrencySafeRoom.reconnectRoom(roomId)))
            .then(() => {
                CurrencySafeI18n.mountLangBar({
                    onChange: () => {
                        CurrencySafeI18n.applyToDocument();
                        const room = CurrencySafeRoom.getRoom(roomId);
                        if (room) render(room);
                    }
                });
                CurrencySafeI18n.applyToDocument();
                bindHostLongPressEnd();
                CurrencySafeRoom.subscribe(roomId, render);
                setInterval(() => {
                    const room = CurrencySafeRoom.getRoom(roomId);
                    if (room) render(room);
                }, 1000);
            });
    </script>
</body>
</html>
